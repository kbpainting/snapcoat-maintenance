<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>SnapCoat Training</title>
<style>
  html,body{margin:0;height:100%;background:#0B1220}
  .wrap{display:flex;align-items:center;justify-content:center;height:100%}
  video{width:100%;height:100%;max-height:100vh;object-fit:contain;background:#0B1220}
  .err{color:#94a3b8;font:15px -apple-system,system-ui,sans-serif;text-align:center;padding:24px}
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>
<script>
  var p = new URLSearchParams(location.search);
  var src = p.get('src') || '';
  var ok = /^https:\/\/files\.catbox\.moe\/[A-Za-z0-9]+\.(mp4|webm|mov)$/.test(src);
  var w = document.getElementById('wrap');
  if (ok) {
    var v = document.createElement('video');
    v.src = src; v.controls = true; v.playsInline = true; v.preload = 'metadata';
    v.setAttribute('playsinline','');
    w.appendChild(v);
  } else {
    w.innerHTML = '<div class="err">Video unavailable.</div>';
  }
</script>
</body>
</html>
