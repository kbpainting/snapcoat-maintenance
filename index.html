<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>SnapCoat — Scheduled Maintenance</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --accent: #3b82f6;
      --accent2: #6366f1;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1d4ed8 0%, transparent 55%), linear-gradient(160deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.5);
    }
    .logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 36px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(59,130,246,0.18), rgba(99,102,241,0.18));
      border: 1px solid var(--border);
    }
    .icon svg { width: 36px; height: 36px; stroke: var(--accent); }
    .icon svg { animation: spin 6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 14px; letter-spacing: -0.5px; }
    p { color: var(--muted); font-size: 16px; line-height: 1.6; margin-bottom: 10px; }
    .sub { margin-top: 18px; font-size: 14px; }
    .divider { height: 1px; background: var(--border); margin: 32px 0 24px; }
    .footer { font-size: 13px; color: var(--muted); }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .dots span {
      display: inline-block; width: 7px; height: 7px; margin: 0 3px; border-radius: 50%;
      background: var(--accent); opacity: 0.4; animation: pulse 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
    @media (max-width: 480px) { .card { padding: 36px 24px; } h1 { font-size: 24px; } }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="logo">SnapCoat</div>
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
    </div>
    <h1>We&rsquo;ll be right back</h1>
    <p>SnapCoat is down for scheduled maintenance while we make things even better.</p>
    <p class="sub">This usually takes just a few minutes. Thanks for your patience.</p>
    <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="divider"></div>
    <p class="footer">Need help in the meantime? Email <a href="mailto:support@snapcoatcrm.com">support@snapcoatcrm.com</a></p>
  </main>
</body>
</html>
